name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 1.22 matches the module's go directive and the Docker builder; stable
        # is an early warning for forward-compatibility breaks.
        go: ['1.22', 'stable']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...
      - name: Test (race)
        run: go test -race ./...

  generated:
    name: generated code & proto lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      # Pin the exact plugin versions used to produce the committed gen/, so a
      # version mismatch can't make the freshness check flake.
      - name: Install codegen plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.6
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: '1.50.0'
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Lint protos
        run: buf lint
      - name: Verify committed generated code is up to date
        run: |
          buf generate
          gofmt -w gen
          if ! git diff --quiet -- gen; then
            echo "gen/ is out of date; run 'make proto' and commit the result:"
            git --no-pager diff -- gen
            exit 1
          fi

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Builds the golang:1.22-bookworm image, continuously verifying the
      # deliberate go 1.22 / grpc v1.71 compatibility target.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: feishu-botd:ci
